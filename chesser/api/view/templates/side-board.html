{% block side_board %}
    <div class="side_board">
		<div class="top-bar">
            <div class="tab">
                <button id="importPGNTabBtn" class="tablinks active">Import PGN</button>
                <button id="importChessComTabBtn"  class="tablinks">Chess.com Matches</button>
            </div>
            <div id="importPGNTab" class="tabcontent" style="display: block;">
                <textarea name="PGN" id="pgn_ta"></textarea>
                <button id="importPGNBtn" class="search-btn">Import PGN</button>
            </div>
            <div id="importChessComTab" class="tabcontent">
                <div>
                    <label for="chess_com_username">Username</label>
                    <input type="text" id="chess_com_username">
                    <button class="search-btn">Seach</button>
                </div>
            </div>
        </div>
		<div class="review">
			<div class="p-move-review head">
				<div class="p-review label">Player</div>
				<div class="p-review accuracy">
					<div class="player-name"><span></span></div>
					<div class="player-acc"><span></span></div>
				</div>
				<div class="p-review accuracy">
					<div class="player-name"><span></span></div>
					<div class="player-acc"><span></span></div>
				</div>
			</div>

			{% for y in ['brilliant', 'great', 'book', 'best', 'excellent', 'good', 'inaccuracy', 'mistake', 'miss', 'blunder'] %}
				<div class="p-move-review {{ y }}">
					<div class="p-review label"><span>{{ y.capitalize() }}</span></div>
					<div class="pm-review"><span>0</span></div>
					<div class="pm-review"><span>0</span></div>
				</div>
			{% endfor %}
		</div>
		<div class="controls">
			<button class="control-btn" id="btn-gotostart">
				<img src="/view/static/images/icons/double-arrow-left.svg" alt="Start">
			</button>
			<button class="control-btn" id="btn-previous">
				<img src="/view/static/images/icons/previous.svg" alt="Previous">
			</button>
			<button class="control-btn" id="btn-play">
				<img src="/view/static/images/icons/play.svg" alt="Play/Stop">
			</button>
			<button class="control-btn" id="btn-next">
				<img src="/view/static/images/icons/next.svg" alt="Next">
			</button>
			<button class="control-btn" id="btn-gotoend">
				<img src="/view/static/images/icons/double-arrow-right.svg" alt="End">
			</button>
		</div>
    </div>
{% endblock %}
